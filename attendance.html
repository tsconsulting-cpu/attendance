<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>勤怠管理 | 株式会社TSコンサルティング</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #f4f6fb;
    color: #1a2340;
    min-height: 100vh;
  }

  .header {
    background: #1a2d6b;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header img {
    height: 36px;
    width: 36px;
    object-fit: contain;
    filter: brightness(0) invert(1);
    margin-right: 12px;
    flex-shrink: 0;
  }
  .header-text-main {
    font-size: 22px;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.3;
  }
  .header-text-sub {
    font-size: 14px;
    color: rgba(255,255,255,0.7);
    line-height: 1.3;
  }

  .main {
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 16px 40px;
  }

  .view-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .view-tab {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: 1.5px solid #dde3f0;
    background: #ffffff;
    color: #5a6a8a;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
  }
  .view-tab.active {
    background: #1a2d6b;
    border-color: #1a2d6b;
    color: #ffffff;
  }

  .card {
    background: #ffffff;
    border: 1px solid #dde3f0;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 2px 12px rgba(26,45,107,0.08);
  }
  .card-title {
    font-size: 11px;
    font-weight: 600;
    color: #5a6a8a;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 14px;
  }

  .clock-display {
    text-align: center;
    padding: 10px 0 16px;
  }
  .clock-time {
    font-family: 'DM Mono', monospace;
    font-size: 52px;
    font-weight: 500;
    color: #1a2d6b;
    letter-spacing: -2px;
    line-height: 1;
  }
  .clock-date-full {
    font-size: 14px;
    color: #5a6a8a;
    margin-top: 8px;
  }

  .name-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .name-btn {
    padding: 16px 8px;
    border-radius: 12px;
    border: 1.5px solid #dde3f0;
    background: #f4f6fb;
    color: #1a2340;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
    text-align: center;
  }
  .name-btn:active { transform: scale(0.96); }
  .name-btn.selected {
    border-color: #1a2d6b;
    background: #e8edf8;
    color: #1a2d6b;
    font-weight: 700;
  }
  .name-btn.clocked-in { border-color: #2e7d52; background: #edfaf3; }
  .name-btn.clocked-out { border-color: #c0392b; background: #fdecea; }

  .action-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 14px;
  }
  .action-btn {
    padding: 16px;
    border-radius: 12px;
    border: none;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
  }
  .action-btn:active { transform: scale(0.97); }
  .btn-in { background: #1a2d6b; color: #ffffff; }
  .btn-out { background: #c0392b; color: #ffffff; }
  .action-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .memo-input {
    width: 100%;
    background: #f4f6fb;
    border: 1.5px solid #dde3f0;
    border-radius: 10px;
    color: #1a2340;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    padding: 12px 14px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
  }
  .memo-input:focus { border-color: #1a2d6b; }
  .memo-input::placeholder { color: #5a6a8a; }

  .status-info {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: #f4f6fb;
    border-radius: 10px;
    margin-top: 12px;
    font-size: 13px;
    color: #5a6a8a;
    border-left: 3px solid #dde3f0;
  }
  .status-info.in { border-left-color: #2e7d52; }
  .status-info.out { border-left-color: #c0392b; }

  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1a2d6b;
    border-radius: 50px;
    padding: 12px 24px;
    font-size: 14px;
    color: #ffffff;
    box-shadow: 0 4px 20px rgba(26,45,107,0.3);
    transition: transform 0.3s cubic-bezier(.34,1.56,.64,1), opacity 0.3s;
    opacity: 0;
    z-index: 999;
    white-space: nowrap;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast.error { background: #c0392b; }

  .history-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid #dde3f0;
  }
  .history-item:last-child { border-bottom: none; }
  .history-badge {
    width: 36px; height: 36px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .badge-in { background: #edfaf3; }
  .badge-out { background: #fdecea; }
  .history-name { font-size: 14px; font-weight: 500; }
  .history-meta { font-size: 12px; color: #5a6a8a; margin-top: 2px; }
  .history-time {
    margin-left: auto;
    font-family: 'DM Mono', monospace;
    font-size: 13px; color: #5a6a8a; text-align: right;
  }
  .history-empty { text-align: center; color: #5a6a8a; font-size: 14px; padding: 32px 0; }

  .admin-toggle {
    display: flex; align-items: center; gap: 8px;
    color: #5a6a8a; font-size: 12px; cursor: pointer; padding: 4px 0;
  }
  .admin-panel { display: none; margin-top: 14px; }
  .admin-panel.open { display: block; }
  .admin-input {
    width: 100%;
    background: #f4f6fb;
    border: 1.5px solid #dde3f0;
    border-radius: 10px;
    color: #1a2340;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 11px 14px;
    outline: none;
    margin-bottom: 8px;
  }
  .admin-input:focus { border-color: #1a2d6b; }
  .admin-save {
    width: 100%; padding: 11px; border-radius: 10px;
    border: 1.5px solid #1a2d6b; background: transparent;
    color: #1a2d6b; font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px; cursor: pointer; font-weight: 500;
  }
  .hint-text {
    font-size: 11px; color: #5a6a8a; line-height: 1.7;
    padding: 10px 12px; background: #f4f6fb;
    border-radius: 8px; margin-top: 10px;
  }
  .hint-text a { color: #1a2d6b; }
  .section-label { font-size: 11px; color: #5a6a8a; letter-spacing: 0.08em; margin-bottom: 8px; }

  #scriptModal {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); z-index: 200;
    padding: 20px; overflow-y: auto;
  }
  .modal-inner {
    max-width: 480px; margin: 0 auto;
    background: #ffffff; border-radius: 16px; padding: 20px;
  }
  pre#scriptCode {
    background: #f4f6fb; border: 1px solid #dde3f0;
    border-radius: 10px; padding: 14px;
    font-size: 11px; font-family: 'DM Mono', monospace;
    color: #1a2d6b; overflow-x: auto; line-height: 1.6;
    white-space: pre-wrap; max-height: 300px; overflow-y: auto;
  }
  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white; border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div style="font-weight:700;font-size:15px;color:#1a2340;">Google Apps Script</div>
      <button onclick="closeScript()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#5a6a8a;">✕</button>
    </div>
    <pre id="scriptCode"></pre>
    <button onclick="copyScript()" style="width:100%;margin-top:12px;padding:12px;border-radius:10px;border:1.5px solid #1a2d6b;background:#e8edf8;color:#1a2d6b;font-family:'Noto Sans JP',sans-serif;font-size:14px;cursor:pointer;font-weight:600;">
      📋 コードをコピー
    </button>
  </div>
</div>

<script>
// ===== 従業員リスト =====
const EMPLOYEES = [
  '梁良',
  '侯玲玲',
  '李叶',
  '楊小颉',
];

// ===== STATE =====
let selectedName = null;
let gasUrl = localStorage.getItem('gasUrl') || '';
let todayRecords = [];

function getTodayKey() {
  const n = new Date();
  return n.getFullYear() + '-' + n.getMonth() + '-' + n.getDate();
}

function loadTodayRecords() {
  const key = getTodayKey();
  if (localStorage.getItem('dayKey') !== key) {
    localStorage.setItem('dayKey', key);
    localStorage.setItem('records', '[]');
  }
  todayRecords = JSON.parse(localStorage.getItem('records') || '[]');
}

function saveTodayRecords() {
  localStorage.setItem('records', JSON.stringify(todayRecords));
}

// ===== CLOCK =====
function updateClock() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clockTime').textContent = hh + ':' + mm + ':' + ss;
  const days = ['日','月','火','水','木','金','土'];
  document.getElementById('clockDateFull').textContent =
    now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日（' + days[now.getDay()] + '）';
}

// ===== NAME BUTTONS =====
function getLastRecord(name) {
  const recs = todayRecords.filter(r => r.name === name);
  return recs.length ? recs[recs.length-1] : null;
}

function buildNameGrid() {
  const grid = document.getElementById('nameGrid');
  grid.innerHTML = '';
  EMPLOYEES.forEach(function(name) {
    const last = getLastRecord(name);
    const btn = document.createElement('button');
    btn.className = 'name-btn' + (last ? (last.type === 'in' ? ' clocked-in' : ' clocked-out') : '');
    btn.textContent = name;
    if (name === selectedName) btn.classList.add('selected');
    btn.onclick = function() { selectName(name); };
    grid.appendChild(btn);
  });
}

function selectName(name) {
  selectedName = name;
  buildNameGrid();
  updateStatus();
}

function updateStatus() {
  const info = document.getElementById('statusInfo');
  const text = document.getElementById('statusText');
  const icon = document.getElementById('statusIcon');
  const btnIn = document.getElementById('btnIn');
  const btnOut = document.getElementById('btnOut');

  if (!selectedName) {
    info.className = 'status-info';
    icon.textContent = '👤';
    text.textContent = '名前を選択してください';
    btnIn.disabled = true;
    btnOut.disabled = true;
    return;
  }
  const last = getLastRecord(selectedName);
  if (!last || last.type === 'out') {
    info.className = 'status-info';
    icon.textContent = '🏠';
    text.textContent = selectedName + '：未出勤';
    btnIn.disabled = false;
    btnOut.disabled = true;
  } else {
    info.className = 'status-info in';
    icon.textContent = '✅';
    text.textContent = selectedName + '：出勤中（' + last.time + ' 〜）';
    btnIn.disabled = true;
    btnOut.disabled = false;
  }
}

// ===== STAMP =====
async function stamp(type) {
  if (!selectedName) return;
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  const record = {
    date: now.getFullYear() + '/' + (now.getMonth()+1) + '/' + now.getDate(),
    name: selectedName,
    type: type,
    time: hh + ':' + mm + ':' + ss,
    memo: document.getElementById('memoInput').value.trim(),
    timestamp: now.toISOString()
  };
  todayRecords.push(record);
  saveTodayRecords();
  document.getElementById('memoInput').value = '';
  buildNameGrid();
  updateStatus();
  renderHistory();
  const label = type === 'in' ? '出勤' : '退勤';
  if (gasUrl) {
    showToast('<span class="spinner"></span>送信中...', '', 99999);
    try {
      await fetch(gasUrl, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify(record) });
      showToast('✅ ' + selectedName + ' の' + label + 'を記録しました', '', 3000);
    } catch(e) {
      showToast('⚠ ローカルに保存済み（オフライン）', 'error', 3000);
    }
  } else {
    showToast('✅ ' + selectedName + ' の' + label + 'を記録しました', '', 3000);
  }
}

// ===== HISTORY =====
function renderHistory() {
  const list = document.getElementById('historyList');
  if (!todayRecords.length) {
    list.innerHTML = '<div class="history-empty">まだ打刻記録がありません</div>';
    return;
  }
  const sorted = todayRecords.slice().reverse();
  list.innerHTML = sorted.map(function(r) {
    return '<div class="history-item">' +
      '<div class="history-badge ' + (r.type==='in'?'badge-in':'badge-out') + '">' + (r.type==='in'?'🟢':'🔴') + '</div>' +
      '<div><div class="history-name">' + r.name + '</div>' +
      '<div class="history-meta">' + (r.type==='in'?'出勤':'退勤') + (r.memo?' · '+r.memo:'') + '</div></div>' +
      '<div class="history-time">' + r.time + '</div>' +
      '</div>';
  }).join('');
}

// ===== TABS =====
function switchView(view) {
  document.querySelectorAll('.view-tab').forEach(function(t, i) {
    t.classList.toggle('active', (i===0 && view==='stamp') || (i===1 && view==='history'));
  });
  document.getElementById('stampView').style.display = view === 'stamp' ? 'block' : 'none';
  document.getElementById('historyView').style.display = view === 'history' ? 'block' : 'none';
  if (view === 'history') renderHistory();
}

// ===== ADMIN =====
function toggleAdmin() {
  const panel = document.getElementById('adminPanel');
  if (panel.classList.contains('open')) {
    panel.classList.remove('open');
    return;
  }
  const pw = prompt('管理者パスワードを入力してください');
  if (pw === 'ts2026') {
    panel.classList.add('open');
    document.getElementById('gasUrl').value = gasUrl;
  } else if (pw !== null) {
    showToast('❌ パスワードが違います', 'error', 2500);
  }
}
function saveSettings() {
  gasUrl = document.getElementById('gasUrl').value.trim();
  localStorage.setItem('gasUrl', gasUrl);
  showToast('✅ URLを保存しました', '', 3000);
  document.getElementById('adminPanel').classList.remove('open');
}

// ===== TOAST =====
let toastTimer;
function showToast(msg, type, duration) {
  const t = document.getElementById('toast');
  t.innerHTML = msg;
  t.className = 'toast' + (type ? ' ' + type : '') + ' show';
  clearTimeout(toastTimer);
  if (duration < 99999) toastTimer = setTimeout(function() { t.classList.remove('show'); }, duration);
}

// ===== GAS SCRIPT =====
const GAS_CODE = `function doPost(e) {
  try {
    var data = JSON.parse(e.postData.contents);
    var ss = SpreadsheetApp.getActiveSpreadsheet();
    var sheet = ss.getSheetByName('勤怠記録') || createSheet(ss);
    sheet.appendRow([data.date, data.name, data.type === 'in' ? '出勤' : '退勤', data.time, data.memo || '', new Date()]);
    return ContentService.createTextOutput(JSON.stringify({status:'ok'})).setMimeType(ContentService.MimeType.JSON);
  } catch(e) {
    return ContentService.createTextOutput(JSON.stringify({status:'error'})).setMimeType(ContentService.MimeType.JSON);
  }
}
function createSheet(ss) {
  var sheet = ss.insertSheet('勤怠記録');
  sheet.appendRow(['日付','氏名','種別','時刻','メモ','記録日時']);
  sheet.getRange(1,1,1,6).setFontWeight('bold').setBackground('#1a2d6b').setFontColor('#ffffff');
  sheet.setFrozenRows(1);
  return sheet;
}`;

function showScript() {
  document.getElementById('scriptCode').textContent = GAS_CODE;
  document.getElementById('scriptModal').style.display = 'block';
}
function closeScript() {
  document.getElementById('scriptModal').style.display = 'none';
}
function copyScript() {
  navigator.clipboard.writeText(GAS_CODE).then(function() {
    showToast('📋 コードをコピーしました', '', 2000);
    closeScript();
  });
}

// ===== INIT =====
loadTodayRecords();
buildNameGrid();
updateStatus();
updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
